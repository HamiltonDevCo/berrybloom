server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Case study redirects (content doesn't meet quality bar — redirect to homepage)
    location ~* ^/case.studies?/ {
        return 301 /;
    }
    location ~* ^/case_studies?/ {
        return 301 /;
    }

    # Category archive pages redirect to blog
    location ~* ^/category/ {
        return 301 /blog/;
    }

    # Pagination redirects
    location ~* ^/(local-seo|uncategorized|increasing-sales|paid-ads|seo-local)/page/ {
        return 301 /blog/;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 404 /404.html;
}
